     HSL(HUE, SATURATION, LIGHTNESS)
     HUE: Is a degree on the color wheel(0 to 360)
     SATURATION: Is the color intensity(0% to 100% where 0% is gray and 100% is the max color)
     LIGHTNESS: Is the lighness(whiteness). From 0% which is black to 50%(neighter black nor white), 100% white
