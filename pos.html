<!DOCTYPE html>
<html>
<head>
<title>CSS Position | Property</title>
<style>
h2{
height:200px;
width:200px;
background:red;
position:relative;
left:50px;
top:5px;
padding:10px;
}
h3{
height:200px;
width:200px;
background:blue;
position:fixed;
left:500px;
top:50px;
padding:10px;
}
#absDiv{
	position: relative;
}
i{
	position:absolute;
	top: 65px;
	left: 80px;
}
#h4{
height:200px;
width:200px;
background:lime;
position:sticky;
left:200px;
top:0px;
padding:10px;
}
</style>
</head>
<body>
<!-- CSS Position
Used to determine the flow or arrangement of our elements on the page
	Types of css positions
1. static: This is default: Here elements are arranged the normal document way
2. relative: Here elements are positioned relative to its normal position
3. fixed: Element is positioned relative to its viewport
4. absolute: Element is positioned relative to its nearest positioned ancestor
5. sticky: Element toggles between the relative and the fixed position depending on the scroll position
		ASIGNMENT
1. Create a div and put an image and a text inside the div
2. Make the text appear on the image
-->
<div id="absDiv">
	<img src="shoe.avif" style="height: 200px;width: 200px;" alt="">
	<i style="color: red;">$500</i>
</div>
<h4 id="h4">Header Four</h4>
