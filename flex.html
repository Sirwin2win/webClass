    <!-- CSS Flexbox
     flex is a short for the cdd flexbox layout module. It is used to arrange items (horizontally or vertically) 
    within a container in a flexible and responsive way
        Two components of flexbox
    1. A flex conatiner
    2. One or more flex items

            flex container properties
    1. display:flex
    2. flex-direction:row|column
    3. flex-wrap: nowrap | wrap
    4. justify-content: flex-start | flex-end | center | spaced-around | spaced-evenly | spaced-between
    5. align-items: flex-start | flex-end | center
    
    -->
