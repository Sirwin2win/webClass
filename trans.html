<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transform | Transition</title>
    <style>
        #trans1{
            height: 200px;
            width: 200px;
            background-color: red;
            color:#fff;
            transform: translate(50px,100px);
        }
        #trans2{
            height: 200px;
            width: 200px;
            background-color: red;
            color:#fff;
            transform: rotate(180deg);
        }
        #trans3{
            height: 200px;
            width: 200px;
            background-color: red;
            color:#fff;
            transform: scale(.5);
        }
        #trans4{
            height: 200px;
            width: 200px;
            background-color: lime;
            color:#fff;
            transform: skew(120deg);
        }
        #trans5{
            height: 200px;
            width: 200px;
            background-color: lime;
            color:#fff;
            /* transform: skew(120deg); */
            transition: height 4s, background-color 4s, color 4s;
            transition-delay: 2s;
        }
        
        #trans5:hover{
            height: 500px;
            background-color: navy;
            color: red;
        }
        
        #trans6{
            height: 200px;
            width: 200px;
            background-image: repeating-linear-gradient(red, green 5%, blue 10%);
            border-radius: 50%;
            color:#fff;
            transform: rotate(0deg);
            transition: height 10s, background-image 10s, color 10s, transform 10s;
            /* transition-delay: 2s; */
            margin-left: 300px;
            transition-timing-function: ease-out;
        }

        #trans6:hover{
            height: 200px;
            background-image: url('laptop.avif');
            background-size: cover;
            color: red;
            transform: rotate(360deg);

        }

         ul{
            list-style-type: none;
           
        }
        ul > li{
            display: inline-block;
            padding: 10px;
        }
        ul > li > a{
            color: #fff;
            text-decoration: none;
            font-family: 'Times New Roman', Times, serif;
            font-size: 30px;
            font-weight: 700;
        }
    </style>
</head>
<body>
        <div style=" background-color: blue; display: flex;">
        <a href="home.html"><img src="logo2.jpg" alt="Logo" style="height: 70px; width: 70px; border-radius: 50%; margin-top: 10px; margin-left: 10px;">
</a>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact Us</a></li>
            <li><a href="home.html">Products</a></li>
        </ul>
    </div>
    <!-- 
    CSS Transform: This is used to move, rotate, scale and skew an element(tag)
    1. translate
    2. rotate
    3. scale
    4. skew

    CSS Transition : This allows us to change the property value of an element over a given duration

                ASSIGNMENT
1. Make the menu bar appear in all the links
2. Design an image on the home page after the menu, and put a text overlay
3. Let the contact us page show the form we built in the last assignment
    -->
    <h1 id="trans1">Translate</h1>
    <h1 id="trans2">Rotate</h1>
    <h1 id="trans3">Scale</h1>
    <h1 id="trans4">Skew</h1>
    <h1 id="trans5">Css Transitions</h1>
    <h1 id="trans6">Css Transform + Transitions</h1>
</body>
</html>
