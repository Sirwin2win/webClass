<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex | Items</title>
    <style>
      #container {
        display: flex;
        flex-direction: column; /* main axis */
        justify-content: space-evenly;
        height: 300px;
      }
      .children {
        height: 100px;
        width: 100px;
        background-color: red;
        color: white;
      }
    </style>
  </head>
  <body>
    <!-- CSS Flex Items Properties
     
    1. order
    2. flex-grow
    3. flex-shrink
    4. flex-basis
    5. flex
    6. align-self
    -->
    <div id="container">
      <div class="children" style="order: 5">Item 1</div>
      <div class="children" style="align-self: center">Item 2</div>
      <div class="children" style="flex: 2 2 50px">Item 3</div>
      <div class="children" style="order: 1">Item 4</div>
      <div class="children">Item 5</div>
    </div>
  </body>
</html>
